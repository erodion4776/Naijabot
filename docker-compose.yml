version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naijabot-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:./dev.db
      - LOG_LEVEL=info
    restart: always

